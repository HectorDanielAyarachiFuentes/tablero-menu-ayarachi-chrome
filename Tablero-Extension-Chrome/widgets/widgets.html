<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">

    <title>Widgets</title>
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="css/widgets.css">

</head>

<body>
    <div class="widgets-header">
        <h2>Widgets</h2>
    </div>
    <div id="widgets-container"></div>

    <!-- Pomodoro Widget Template -->
    <template id="pomodoro-template">
        <div class="widget-title">
            <span class="widget-title-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" role="img"
                    aria-label="Reloj">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                </svg>
            </span>
            Pomodoro
            <button class="pomo-settings-icon-btn" id="pomo-settings-toggle" title="Configuración">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>

        <div class="pomo-config-panel" id="pomo-config-panel">
            <div class="pomo-config-row">
                <label>Focus</label>
                <div class="pomo-config-stepper">
                    <button class="pomo-step-btn" data-step="-5" data-field="focusTime">-</button>
                    <input type="number" id="pomo-focus-input" class="pomodoro-input" min="1" max="120" step="1">
                    <span class="pomo-config-unit">min</span>
                    <button class="pomo-step-btn" data-step="5" data-field="focusTime">+</button>
                </div>
            </div>
            <div class="pomo-config-row">
                <label>Descanso</label>
                <div class="pomo-config-stepper">
                    <button class="pomo-step-btn" data-step="-1" data-field="breakTime">-</button>
                    <input type="number" id="pomo-break-input" class="pomodoro-input" min="1" max="30" step="1">
                    <span class="pomo-config-unit">min</span>
                    <button class="pomo-step-btn" data-step="1" data-field="breakTime">+</button>
                </div>
            </div>
        </div>

        <div class="pomodoro-mode-switch">
            <button class="pomodoro-mode-btn active" data-mode="focus">Focus</button>
            <button class="pomodoro-mode-btn" data-mode="short-break">Descanso</button>
        </div>

        <div class="pomo-ring-container" id="pomo-ring-container">
            <svg class="pomo-ring-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <circle class="pomo-ring-bg" cx="60" cy="60" r="52" />
                <circle class="pomo-ring-progress" id="pomo-ring-progress" cx="60" cy="60" r="52" />
            </svg>
            <div class="pomo-ring-inner">
                <div class="pomodoro-time" id="pomo-time">25:00</div>
                <div class="pomo-mode-label" id="pomo-mode-label">FOCO</div>
            </div>
        </div>

        <div class="pomodoro-controls">
            <button class="pomodoro-btn" id="pomo-toggle" title="Iniciar/Pausar">
                <svg class="pomo-icon-play" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="8 5 19 12 8 19 8 5"></polygon>
                </svg>
                <svg class="pomo-icon-pause" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20"
                    height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>
            <button class="pomodoro-btn pomodoro-btn-reset" id="pomo-reset" title="Reiniciar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
            </button>
        </div>
    </template>

    <script type="module" src="js/widget-manager.js"></script>

</body>

</html>
